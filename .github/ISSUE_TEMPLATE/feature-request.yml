name: "Feature Request"
description: Suggest an idea for Sealhouse.
title: "Feature Request: [Short Description]"
labels: ["feature request", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement to Sealhouse.

  - type: input
    id: title
    attributes:
      label: Feature Title
      description: What would you call this feature?
      placeholder: e.g. Advanced Signature Verification
    validations:
      required: true

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: Please describe the feature and the workflow it improves.
      placeholder: I am proposing...
    validations:
      required: true

  - type: dropdown
    id: featuretype
    attributes:
      label: Feature Type
      multiple: true
      options:
        - UI/UX improvement
        - Security / compliance
        - Performance / optimization
        - Integration
        - Documentation
        - Other

  - type: dropdown
    id: importance
    attributes:
      label: Importance
      description: How important is this feature to you?
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, examples, or safe screenshots.
      placeholder: Additional details...

  - type: checkboxes
    id: terms
    attributes:
      label: Code Of Conduct
      description: By submitting this request, you agree to follow the Sealhouse Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
        - label: I have searched existing issues and discussions for duplicates.
          required: true
