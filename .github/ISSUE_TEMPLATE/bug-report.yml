name: "Bug Report"
description: Create a bug report to help improve Sealhouse.
title: "[Bug]: "
labels: ["bug", "up-for-grabs"]
body:
  - type: textarea
    attributes:
      label: Issue Description
      description: Please provide a clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen.

  - type: textarea
    attributes:
      label: Current Behavior
      description: Describe what is happening instead.

  - type: textarea
    attributes:
      label: Steps To Reproduce
      description: Include step-by-step instructions, URLs, error messages, and any relevant non-sensitive details.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Screenshots
      description: Add screenshots if they help explain the issue. Do not include private documents, signatures, credentials, or customer data.

  - type: input
    attributes:
      label: Operating System
      placeholder: Windows 11, macOS Sonoma 14.1, Ubuntu 24.04

  - type: dropdown
    id: browsers
    attributes:
      label: Browser
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Microsoft Edge

  - type: input
    attributes:
      label: Sealhouse Version
      placeholder: e.g. 1.0.6
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      multiple: true
      options:
        - Self-hosted production
        - Self-hosted staging
        - Hosted on my own domain
        - Local development

  - type: checkboxes
    attributes:
      label: Public Safety
      options:
        - label: I have removed private documents, signatures, credentials, customer data, and sensitive URLs from this report.
          required: true
        - label: I have searched existing issues and discussions for duplicates.
          required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code Of Conduct
      description: By submitting this issue, you agree to follow the Sealhouse Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
