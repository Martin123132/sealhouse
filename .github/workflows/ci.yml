name: Sealhouse CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branding:
    name: Public branding guard
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check public branding
        run: .\tools\check-public-branding.ps1

  frontend:
    name: Frontend build
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: apps\OpenSign
        run: |
          if not exist "%RUNNER_TEMP%\npm" mkdir "%RUNNER_TEMP%\npm"
          set "TEMP=%RUNNER_TEMP%"
          set "TMP=%RUNNER_TEMP%"
          set "npm_config_cache=%RUNNER_TEMP%\npm"
          npm.cmd ci

      - name: Build frontend
        working-directory: apps\OpenSign
        run: |
          set "CI=true"
          npm.cmd run build

  server:
    name: Server dependency and syntax check
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install server dependencies
        working-directory: apps\OpenSignServer
        run: |
          if not exist "%RUNNER_TEMP%\npm" mkdir "%RUNNER_TEMP%\npm"
          set "TEMP=%RUNNER_TEMP%"
          set "TMP=%RUNNER_TEMP%"
          set "npm_config_cache=%RUNNER_TEMP%\npm"
          npm.cmd ci

      - name: Check server entrypoint syntax
        working-directory: apps\OpenSignServer
        run: |
          set "CI=true"
          node --check index.js

  signing-smoke:
    name: Signing-flow smoke
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install server dependencies
        working-directory: apps\OpenSignServer
        run: |
          if not exist "%RUNNER_TEMP%\npm" mkdir "%RUNNER_TEMP%\npm"
          set "TEMP=%RUNNER_TEMP%"
          set "TMP=%RUNNER_TEMP%"
          set "npm_config_cache=%RUNNER_TEMP%\npm"
          npm.cmd ci

      - name: Run generated-data signing smoke
        working-directory: apps\OpenSignServer
        run: |
          set "CI=true"
          set "TESTING=true"
          if not exist "%RUNNER_TEMP%\sealhouse-mongo" mkdir "%RUNNER_TEMP%\sealhouse-mongo"
          npx.cmd mongodb-runner exec --tmpDir "%RUNNER_TEMP%\sealhouse-mongo\tmp" --downloadDir "%RUNNER_TEMP%\sealhouse-mongo\downloads" --runnerDir "%RUNNER_TEMP%\sealhouse-mongo\runner" --logDir "%RUNNER_TEMP%\sealhouse-mongo\logs" --id sealhouse-smoke --version 7.0.14 -- node node_modules\jasmine\bin\jasmine.js --random=false
